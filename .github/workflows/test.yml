name: Java CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  all_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up JDK 23
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '23'

    - name: Build and run tests with Maven
      run: mvn test
